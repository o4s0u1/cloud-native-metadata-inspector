name: Cloud-Native Metadata Inspector - Initial Infra Check

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # --- INITIAL BUILD ---
  terraform:
    name: 'Infrastructure Setup'
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    outputs:
      registry_repo: ${{ steps.tf-out.outputs.REGISTRY_REPO }}
      runtime_sa: ${{ steps.tf-out.outputs.RUNTIME_SA }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Capture Outputs
        id: tf-out
        working-directory: ./terraform
        run: |
          echo "REGISTRY_REPO=$(terraform output -raw repository_name)" >> $GITHUB_OUTPUT
          echo "RUNTIME_SA=$(terraform output -raw runtime_sa_email)" >> $GITHUB_OUTPUT